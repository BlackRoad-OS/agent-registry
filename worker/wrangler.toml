name = "agent-registry"
main = "src/index.js"
compatibility_date = "2024-12-01"
account_id = ""  # Set via CF_ACCOUNT_ID secret

[vars]
ENVIRONMENT = "production"
REGISTRY_VERSION = "1.0.0"

[[d1_databases]]
binding = "DB"
database_name = "agent-registry"
database_id = ""  # Set via CF_D1_DATABASE_ID secret

[triggers]
crons = ["0 */6 * * *"]  # Health check every 6 hours
