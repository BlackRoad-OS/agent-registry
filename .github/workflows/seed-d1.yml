name: Seed — D1 Database

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'seed' to confirm database seeding"
        required: true

permissions:
  contents: read

jobs:
  seed:
    name: Seed D1 with Agent Data
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'seed'
    environment: production
    defaults:
      run:
        working-directory: worker
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: "20"

      - name: Install wrangler
        run: npm ci

      - name: Run D1 migrations
        run: npx wrangler d1 migrations apply agent-registry --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Seed agents from agents.json
        run: |
          node -e "
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('../agents.json', 'utf-8'));
          const stmts = data.agents.map(a =>
            \`INSERT OR REPLACE INTO agents (id, name, type, capabilities, birthday, memory_hash, home_world, status) VALUES ('\${a.id}', '\${a.name.replace(/'/g, \"''\")}', '\${a.type}', '\${JSON.stringify(a.capabilities)}', '\${a.birthday}', '\${a.memory_hash}', '\${a.home_world}', '\${a.status}');\`
          );
          // Write in batches of 100
          for (let i = 0; i < stmts.length; i += 100) {
            const batch = stmts.slice(i, i + 100).join('\n');
            fs.writeFileSync(\`/tmp/seed-batch-\${i}.sql\`, batch);
          }
          console.log(\`Generated \${Math.ceil(stmts.length / 100)} batch files\`);
          "
          for f in /tmp/seed-batch-*.sql; do
            echo "Seeding batch: $f"
            npx wrangler d1 execute agent-registry --remote --file="$f"
          done
          echo "Seeding complete"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
