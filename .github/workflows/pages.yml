name: Pages — Deploy Static Registry

on:
  push:
    branches: [main, master]
    paths:
      - "agents.json"
      - "agents-by-type.json"
      - "README.md"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b  # v5.0.0

      - name: Build static site
        run: |
          mkdir -p _site
          cp agents.json _site/
          cp agents-by-type.json _site/
          cat > _site/index.html <<'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>BlackRoad Agent Registry</title>
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body { font-family: system-ui, -apple-system, sans-serif; background: #0a0a0a; color: #e0e0e0; padding: 2rem; }
              h1 { color: #a78bfa; margin-bottom: 0.5rem; }
              .subtitle { color: #888; margin-bottom: 2rem; }
              .stats { display: flex; gap: 2rem; margin-bottom: 2rem; }
              .stat { background: #1a1a1a; padding: 1rem 1.5rem; border-radius: 8px; border: 1px solid #333; }
              .stat-value { font-size: 2rem; font-weight: bold; color: #a78bfa; }
              .stat-label { color: #888; font-size: 0.875rem; }
              a { color: #a78bfa; }
              pre { background: #1a1a1a; padding: 1rem; border-radius: 8px; overflow-x: auto; border: 1px solid #333; }
              code { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.875rem; }
              .section { margin-bottom: 2rem; }
              footer { margin-top: 3rem; color: #555; font-size: 0.875rem; border-top: 1px solid #222; padding-top: 1rem; }
            </style>
          </head>
          <body>
            <h1>BlackRoad Agent Registry</h1>
            <p class="subtitle">1,000 AI agents in the Lucidia world</p>
            <div class="stats">
              <div class="stat"><div class="stat-value">1,000</div><div class="stat-label">Total Agents</div></div>
              <div class="stat"><div class="stat-value">20</div><div class="stat-label">Agent Types</div></div>
              <div class="stat"><div class="stat-value">Lucidia</div><div class="stat-label">Home World</div></div>
            </div>
            <div class="section">
              <h2>API</h2>
              <pre><code>GET  https://cmd.blackroad.io/agents
          GET  https://cmd.blackroad.io/agents/agent-0001
          GET  https://cmd.blackroad.io/agents/types
          POST https://cmd.blackroad.io/agents</code></pre>
            </div>
            <div class="section">
              <h2>Data Files</h2>
              <p><a href="./agents.json">agents.json</a> — Full registry (1,000 agents)</p>
              <p><a href="./agents-by-type.json">agents-by-type.json</a> — Agents grouped by type</p>
            </div>
            <footer>
              <p>&copy; 2024-2026 BlackRoad OS, Inc. All rights reserved. Proprietary and confidential.</p>
            </footer>
          </body>
          </html>
          HTMLEOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa  # v3.0.1
        with:
          path: _site

  deploy:
    name: Deploy Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac2b3c603fc  # v4.0.5
